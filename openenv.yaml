spec_version: 1
name: search-ranking-env
type: space
runtime: docker
app: server.app:main
port: 7860

description: >
  An environment that simulates a real-world search ranking system.
  An agent receives a query and a set of candidate documents, then produces
  an ordered ranking. The environment evaluates the ranking using NDCG
  (Normalized Discounted Cumulative Gain) and returns a continuous reward
  strictly between 0 and 1 (exclusive).

reward_range: [0.01, 0.99]

tasks:
  - id: easy
    name: Easy Search Ranking
    description: >
      3-5 documents per query with clear relevance differences and low
      ambiguity. Designed as a baseline sanity check.
    difficulty: easy
    grader: server.grader:grade

  - id: medium
    name: Medium Search Ranking
    description: >
      5-10 documents per query with overlapping relevance scores and
      distractor documents. Requires distinguishing closely related content.
    difficulty: medium
    grader: server.grader:grade

  - id: hard
    name: Hard Search Ranking
    description: >
      10-15 documents per query with high ambiguity, very similar
      relevance levels, and misleading content. Tests fine-grained
      ranking ability under noisy conditions.
    difficulty: hard
    grader: server.grader:grade

evaluation:
  primary_metric: ndcg
  additional_metrics:
    - precision_at_k
    - mrr

constraints:
  deterministic: true
  single_step_episodes: true
  max_steps_per_episode: 1

environment_variables:
  - name: API_BASE_URL
    description: Base URL for the OpenAI-compatible LLM endpoint.
    required: true
  - name: API_KEY
    description: API key for the provided LiteLLM proxy.
    required: true
  - name: MODEL_NAME
    description: Model identifier for the LLM.
    required: false
